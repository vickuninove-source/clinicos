<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClinicOS — Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0d12;
      --surface: #111520;
      --surface2: #161c2b;
      --border: #1e2535;
      --accent: #4fd1c5;
      --accent2: #38bdf8;
      --text: #e2e8f0;
      --muted: #64748b;
      --error: #f87171;
      --success: #4ade80;
      --warning: #fbbf24;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
    }

    /* SIDEBAR */
    .sidebar {
      width: 240px;
      min-height: 100vh;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 24px 16px;
      position: fixed;
      top: 0; left: 0; bottom: 0;
    }

    .logo {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 12px;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }

    .logo-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 600;
    }
    .logo-text span { color: var(--accent); }

    nav { flex: 1; display: flex; flex-direction: column; gap: 4px; }

    .nav-section {
      font-size: 10px;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 16px 12px 8px;
    }

    .nav-link {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      color: var(--muted);
      text-decoration: none;
      font-size: 14px;
      font-weight: 400;
      transition: all 0.15s;
      cursor: pointer;
    }

    .nav-link:hover { background: var(--surface2); color: var(--text); }
    .nav-link.active { background: rgba(79,209,197,0.1); color: var(--accent); }
    .nav-link .icon { font-size: 16px; width: 20px; text-align: center; }

    .sidebar-footer {
      border-top: 1px solid var(--border);
      padding-top: 16px;
      margin-top: 16px;
    }

    .clinica-info {
      padding: 10px 12px;
      display: flex; align-items: center; gap: 10px;
    }

    .avatar {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 600; color: #0a0d12;
      flex-shrink: 0;
    }

    .clinica-nome {
      font-size: 13px; font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .clinica-plano {
      font-size: 11px; color: var(--muted);
    }

    .btn-logout {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      color: var(--muted);
      background: none; border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px; cursor: pointer;
      transition: all 0.15s; width: 100%;
    }
    .btn-logout:hover { background: rgba(248,113,113,0.1); color: var(--error); }

    /* MAIN */
    .main {
      margin-left: 240px;
      flex: 1;
      padding: 32px 36px;
      min-height: 100vh;
    }

    .page-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 32px;
    }

    .page-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 32px; font-weight: 600;
    }

    .page-subtitle { font-size: 14px; color: var(--muted); margin-top: 2px; }

    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 18px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; border-radius: 10px;
      color: #0a0d12; font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 600; cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      text-decoration: none;
    }
    .btn:hover { opacity: 0.9; transform: translateY(-1px); }

    /* STATS */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      animation: fadeUp 0.4s ease forwards;
      opacity: 0;
    }

    .stat-card:nth-child(1) { animation-delay: 0.1s; }
    .stat-card:nth-child(2) { animation-delay: 0.2s; }
    .stat-card:nth-child(3) { animation-delay: 0.3s; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .stat-label {
      font-size: 12px; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.8px;
      margin-bottom: 12px;
    }

    .stat-value {
      font-family: 'Cormorant Garamond', serif;
      font-size: 42px; font-weight: 600; line-height: 1;
      margin-bottom: 4px;
    }

    .stat-sub { font-size: 12px; color: var(--muted); }

    .stat-icon {
      float: right; font-size: 28px; margin-top: -4px;
      opacity: 0.4;
    }

    /* CONSULTAS RECENTES */
    .section-title {
      font-size: 16px; font-weight: 500;
      margin-bottom: 16px;
      display: flex; align-items: center; gap: 8px;
    }

    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }

    table { width: 100%; border-collapse: collapse; }

    thead { background: var(--surface2); }

    th {
      padding: 12px 20px;
      text-align: left;
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    td {
      padding: 14px 20px;
      font-size: 14px;
      border-top: 1px solid var(--border);
    }

    tr:hover td { background: var(--surface2); }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
    }

    .badge-agendada { background: rgba(56,189,248,0.1); color: var(--accent2); }
    .badge-realizada { background: rgba(74,222,128,0.1); color: var(--success); }
    .badge-cancelada { background: rgba(248,113,113,0.1); color: var(--error); }

    .empty {
      text-align: center; padding: 48px;
      color: var(--muted); font-size: 14px;
    }

    .empty-icon { font-size: 36px; margin-bottom: 12px; opacity: 0.4; }
  </style>
</head>
<body>

<aside class="sidebar">
      <div class="logo" style="display:flex;align-items:center;gap:12px;">
      <div style="width:36px;height:36px;background:#4fd1c5;border-radius:10px;display:flex;align-items:center;justify-content:center;">
        <svg viewBox="0 0 36 36" width="36" height="36" xmlns="http://www.w3.org/2000/svg">
          <path d="M 25 8 A 12 12 0 1 0 25 28" fill="none" stroke="#0a0d12" stroke-width="4" stroke-linecap="round"/>
          <line x1="25" y1="8" x2="32" y2="8" stroke="#0a0d12" stroke-width="4" stroke-linecap="round"/>
          <line x1="25" y1="28" x2="32" y2="28" stroke="#0a0d12" stroke-width="4" stroke-linecap="round"/>
        </svg>
      </div>
      <div style="font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;">
        Clinic<span style="color:#4fd1c5;">OS</span>
      </div>
    </div>

    </div>
    <button class="btn-logout" onclick="logout()">
      <span>⎋</span> Sair
    </button>
  </div>
</aside>

<main class="main">
  <div class="page-header">
    <div>
      <div class="page-title">Dashboard</div>
      <div class="page-subtitle" id="saudacao">Bem-vindo de volta</div>
    </div>
    <a class="btn" href="/consultas.html">+ Nova consulta</a>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-icon">◉</div>
      <div class="stat-label">Total de Pacientes</div>
      <div class="stat-value" id="total-pacientes">—</div>
      <div class="stat-sub">cadastrados</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">◷</div>
      <div class="stat-label">Consultas Hoje</div>
      <div class="stat-value" id="consultas-hoje">—</div>
      <div class="stat-sub">agendadas</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">◈</div>
      <div class="stat-label">Total de Consultas</div>
      <div class="stat-value" id="total-consultas">—</div>
      <div class="stat-sub">registradas</div>
    </div>
  </div>

  <div class="section-title">◷ Próximas consultas</div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Paciente</th>
          <th>Data / Hora</th>
          <th>Procedimento</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="consultas-tbody">
        <tr><td colspan="4" class="empty"><div class="empty-icon">◷</div>Carregando...</td></tr>
      </tbody>
    </table>
  </div>
</main>

<script>
  const API = 'https://clinicos-backend-production-68fe.up.railway.app';
  const token = localStorage.getItem('token');
  if (!token) window.location.href = '/login.html';

  const clinica = JSON.parse(localStorage.getItem('clinica') || '{}');
  document.getElementById('clinica-nome').textContent = clinica.nome || 'Clínica';
  document.getElementById('clinica-plano').textContent = 'Plano ' + (clinica.plano || 'starter');
  document.getElementById('avatar').textContent = (clinica.nome || 'C')[0].toUpperCase();

  const hora = new Date().getHours();
  const saud = hora < 12 ? 'Bom dia' : hora < 18 ? 'Boa tarde' : 'Boa noite';
  document.getElementById('saudacao').textContent = `${saud}, ${clinica.nome || 'doutor(a)'}`;

  async function apiFetch(path) {
    const res = await fetch(API + path, { headers: { Authorization: 'Bearer ' + token } });
    if (res.status === 401) { logout(); return null; }
    return res.json();
  }

  function logout() {
    localStorage.clear();
    window.location.href = '/login.html';
  }

  async function loadData() {
    const [pacientes, consultas] = await Promise.all([
      apiFetch('/api/pacientes'),
      apiFetch('/api/consultas')
    ]);

    if (pacientes) document.getElementById('total-pacientes').textContent = pacientes.length;
    if (consultas) {
      document.getElementById('total-consultas').textContent = consultas.length;
      const hoje = new Date().toISOString().split('T')[0];
      const hojeCount = consultas.filter(c => c.data_hora?.startsWith(hoje)).length;
      document.getElementById('consultas-hoje').textContent = hojeCount;

      const proximas = consultas
        .filter(c => new Date(c.data_hora) >= new Date())
        .slice(0, 8);

      const tbody = document.getElementById('consultas-tbody');
      if (proximas.length === 0) {
        tbody.innerHTML = `<tr><td colspan="4" class="empty"><div class="empty-icon">◷</div>Nenhuma consulta agendada</td></tr>`;
      } else {
        tbody.innerHTML = proximas.map(c => {
          const dt = new Date(c.data_hora);
          const dataFmt = dt.toLocaleDateString('pt-BR') + ' ' + dt.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
          const badge = `badge-${c.status || 'agendada'}`;
          return `<tr>
            <td>${c.paciente_nome || '—'}</td>
            <td>${dataFmt}</td>
            <td>${c.procedimento || '—'}</td>
            <td><span class="badge ${badge}">${c.status || 'agendada'}</span></td>
          </tr>`;
        }).join('');
      }
    }
  }

  loadData();
</script>
</body>
</html>
