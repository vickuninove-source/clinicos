 <!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClinicOS — Entrar</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: Arial, sans-serif; background:#1A110A; min-height:100vh; display:flex; align-items:center; justify-content:center; }
.box { background:#2C1E14; border:1px solid rgba(196,158,110,0.2); border-radius:20px; padding:48px 40px; width:100%; max-width:420px; }
.logo { font-size:1.8rem; font-weight:900; color:white; text-align:center; margin-bottom:8px; }
.logo span { color:#C0664A; }
.subtitle { text-align:center; color:rgba(245,230,208,0.5); font-size:.9rem; margin-bottom:32px; }
.tabs { display:flex; background:rgba(255,255,255,0.05); border-radius:10px; padding:4px; margin-bottom:28px; }
.tab { flex:1; padding:10px; text-align:center; border-radius:7px; cursor:pointer; font-size:.88rem; font-weight:600; color:rgba(245,230,208,0.4); transition:all .2s; }
.tab.active { background:#C0664A; color:white; }
.form-group { margin-bottom:16px; }
label { display:block; font-size:.75rem; font-weight:700; text-transform:uppercase; letter-spacing:.5px; color:rgba(245,230,208,0.5); margin-bottom:6px; }
input, select { width:100%; background:rgba(255,255,255,0.06); border:1px solid rgba(196,158,110,0.2); border-radius:8px; padding:12px 14px; color:white; font-size:.9rem; font-family:Arial,sans-serif; outline:none; transition:border-color .2s; }
input:focus, select:focus { border-color:#C0664A; }
input::placeholder { color:rgba(245,230,208,0.3); }
select option { background:#2C1E14; }
.btn { width:100%; padding:14px; background:#C0664A; border:none; border-radius:10px; color:white; font-size:1rem; font-weight:700; cursor:pointer; margin-top:8px; transition:background .2s; font-family:Arial,sans-serif; }
.btn:hover { background:#D4795C; }
.btn:disabled { opacity:.5; cursor:not-allowed; }
.msg { text-align:center; margin-top:16px; font-size:.85rem; border-radius:8px; padding:10px; display:none; }
.msg.erro { background:rgba(192,102,74,0.2); color:#D4795C; display:block; }
.msg.ok { background:rgba(122,158,126,0.2); color:#7A9E7E; display:block; }
.back { text-align:center; margin-top:20px; }
.back a { color:rgba(245,230,208,0.4); font-size:.82rem; text-decoration:none; }
.back a:hover { color:#C0664A; }
</style>
</head>
<body>
<div class="box">
  <div class="logo">Clinic<span>OS</span></div>
  <div class="subtitle">Gestão inteligente para clínicas</div>

  <div class="tabs">
    <div class="tab active" onclick="showTab('login')">Entrar</div>
    <div class="tab" onclick="showTab('registro')">Criar conta</div>
  </div>

  <!-- LOGIN -->
  <div id="formLogin">
    <div class="form-group">
      <label>E-mail</label>
      <input type="email" id="loginEmail" placeholder="seu@email.com">
    </div>
    <div class="form-group">
      <label>Senha</label>
      <input type="password" id="loginSenha" placeholder="••••••••">
    </div>
    <button class="btn" onclick="fazerLogin()">Entrar na clínica</button>
    <div class="msg" id="loginMsg"></div>
  </div>

  <!-- REGISTRO -->
  <div id="formRegistro" style="display:none">
    <div class="form-group">
      <label>Nome da clínica</label>
      <input type="text" id="regNome" placeholder="Ex: Clínica Bella Vita">
    </div>
    <div class="form-group">
      <label>E-mail</label>
      <input type="email" id="regEmail" placeholder="contato@suaclinica.com">
    </div>
    <div class="form-group">
      <label>Senha</label>
      <input type="password" id="regSenha" placeholder="Mínimo 6 caracteres">
    </div>
    <div class="form-group">
      <label>Especialidade</label>
      <select id="regEspec">
        <option value="odontologia">🦷 Odontologia</option>
        <option value="estetica">✨ Estética Facial/Corporal</option>
        <option value="psicologia">🧠 Psicologia</option>
        <option value="nutricao">🥗 Nutrição</option>
        <option value="medicina">⚕️ Medicina</option>
      </select>
    </div>
    <button class="btn" onclick="fazerRegistro()">Criar conta grátis</button>
    <div class="msg" id="regMsg"></div>
  </div>

  <div class="back"><a href="/">← Voltar ao site</a></div>
</div>

<script>
const API = 'https://clinicos-backend-production-68fe.up.railway.app';

function showTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (tab==='login'&&i===0)||(tab==='registro'&&i===1)));
  document.getElementById('formLogin').style.display = tab==='login' ? 'block' : 'none';
  document.getElementById('formRegistro').style.display = tab==='registro' ? 'block' : 'none';
}

async function fazerLogin() {
  const email = document.getElementById('loginEmail').value;
  const senha = document.getElementById('loginSenha').value;
  const msg = document.getElementById('loginMsg');
  if (!email || !senha) { msg.className='msg erro'; msg.textContent='Preencha todos os campos'; return; }
  try {
    const res = await fetch(API+'/api/login', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({email, senha})
    });
    const data = await res.json();
    if (!res.ok) { msg.className='msg erro'; msg.textContent=data.erro; return; }
    localStorage.setItem('clinicos_token', data.token);
    localStorage.setItem('clinicos_clinica', JSON.stringify(data.clinica));
    msg.className='msg ok'; msg.textContent='Login feito! Redirecionando...';
    setTimeout(() => window.location.href='/dashboard', 1500);
  } catch(e) {
    msg.className='msg erro'; msg.textContent='Erro de conexão. Tente novamente.';
  }
}

async function fazerRegistro() {
  const nome = document.getElementById('regNome').value;
  const email = document.getElementById('regEmail').value;
  const senha = document.getElementById('regSenha').value;
  const especialidade = document.getElementById('regEspec').value;
  const msg = document.getElementById('regMsg');
