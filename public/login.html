<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ClinicOS</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--accent:#c1714f;--accent2:#e8916e;--text:#1a1208;--text2:#4a3728;--text3:#9c8070;--border:rgba(139,90,60,.12);--error:#c0392b;--success:#5a8a5a}
body{background:#faf8f5;color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;display:flex;-webkit-font-smoothing:antialiased;overflow:hidden}
.left{flex:1;background:var(--text);display:flex;flex-direction:column;justify-content:space-between;padding:48px;position:relative;overflow:hidden}
.left-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(193,113,79,.3) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(184,149,106,.15) 0%,transparent 50%);pointer-events:none}
.left-logo{position:relative;display:flex;align-items:center;gap:12px}
.left-logo-icon{width:42px;height:42px;background:var(--accent);border-radius:11px;display:flex;align-items:center;justify-content:center}
.left-logo-text{font-family:'Playfair Display',serif;font-size:24px;font-weight:600;color:#fff}
.left-logo-text span{color:var(--accent2)}
.left-content{position:relative}
.left-title{font-family:'Playfair Display',serif;font-size:clamp(32px,4vw,52px);font-weight:600;color:#fff;line-height:1.1;margin-bottom:20px}
.left-title span{color:var(--accent2)}
.left-sub{font-size:16px;color:rgba(255,255,255,.5);line-height:1.7;max-width:360px}
.left-features{display:flex;flex-direction:column;gap:12px;position:relative}
.feat{display:flex;align-items:center;gap:12px;color:rgba(255,255,255,.6);font-size:14px}
.feat-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0}
.right{width:480px;display:flex;align-items:center;justify-content:center;padding:48px 40px;background:#faf8f5}
.card{width:100%;max-width:380px}
.card-title{font-family:'Playfair Display',serif;font-size:30px;font-weight:600;color:var(--text);margin-bottom:6px}
.card-sub{font-size:14px;color:var(--text3);margin-bottom:32px}
.tabs{display:flex;background:#f0ebe3;border-radius:10px;padding:3px;margin-bottom:28px;gap:2px}
.tab{flex:1;background:none;border:none;font-family:'Inter',sans-serif;font-size:14px;font-weight:500;padding:8px;border-radius:8px;cursor:pointer;color:var(--text3);transition:all .2s}
.tab.active{background:#fff;color:var(--text);box-shadow:0 1px 4px rgba(139,90,60,.1)}
.form{display:flex;flex-direction:column;gap:14px}
.form.hidden{display:none}
.field{display:flex;flex-direction:column;gap:6px}
label{font-size:12px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}
input{background:#f5f1ec;border:1px solid rgba(139,90,60,.1);border-radius:12px;padding:13px 16px;color:var(--text);font-family:'Inter',sans-serif;font-size:15px;outline:none;transition:all .2s}
input:focus{background:#fff;border-color:var(--accent);box-shadow:0 0 0 3px rgba(193,113,79,.12)}
input::placeholder{color:var(--text3)}
.btn{margin-top:6px;padding:14px;background:var(--accent);border:none;border-radius:12px;color:#fff;font-family:'Inter',sans-serif;font-size:15px;font-weight:500;cursor:pointer;transition:all .15s;letter-spacing:.1px}
.btn:hover{background:var(--accent2);box-shadow:0 4px 20px rgba(193,113,79,.35)}
.btn:active{transform:scale(.98)}
.btn:disabled{opacity:.45}
.msg{font-size:13px;padding:10px 14px;border-radius:10px;margin-top:4px}
.msg.error{background:rgba(192,57,43,.07);color:var(--error);border:1px solid rgba(192,57,43,.15)}
</style>
</head>
<body>

<div class="left">
  <div class="left-bg"></div>
  <div class="left-logo">
    <div class="left-logo-icon">
      <svg viewBox="0 0 28 28" width="26" height="26"><path d="M19 5A11 11 0 1 0 19 23" fill="none" stroke="#fff" stroke-width="2.8" stroke-linecap="round"/><line x1="19" y1="5" x2="25" y2="5" stroke="#fff" stroke-width="2.8" stroke-linecap="round"/><line x1="19" y1="23" x2="25" y2="23" stroke="#fff" stroke-width="2.8" stroke-linecap="round"/></svg>
    </div>
    <div class="left-logo-text">Clinic<span>OS</span></div>
  </div>
  <div class="left-content">
    <h1 class="left-title">Bem-vindo ao<br><span>ClinicOS</span></h1>
    <p class="left-sub">Tudo que sua clínica precisa em uma plataforma elegante e intuitiva.</p>
  </div>
  <div class="left-features">
    <div class="feat"><div class="feat-dot"></div>Pacientes, consultas e retornos</div>
    <div class="feat"><div class="feat-dot"></div>Controle financeiro completo</div>
    <div class="feat"><div class="feat-dot"></div>Estoque e orçamentos</div>
    <div class="feat"><div class="feat-dot"></div>Adaptado para qualquer especialidade</div>
  </div>
</div>

<div class="right">
  <div class="card">
    <div class="card-title">Bem-vindo</div>
    <div class="card-sub">Acesse sua clínica</div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Entrar</button>
      <button class="tab" onclick="switchTab('registro')">Criar conta</button>
    </div>
    <div id="msg-g"></div>
    <form class="form" id="form-login" onsubmit="fazerLogin(event)">
      <div class="field"><label>E-mail</label><input type="email" id="login-email" placeholder="seu@email.com" required/></div>
      <div class="field"><label>Senha</label><input type="password" id="login-senha" placeholder="••••••••" required/></div>
      <button class="btn" type="submit" id="btn-login">Entrar na clínica</button>
    </form>
    <form class="form hidden" id="form-reg" onsubmit="fazerReg(event)">
      <div class="field"><label>Nome da clínica</label><input type="text" id="reg-nome" placeholder="Clínica Exemplo" required/></div>
      <div class="field"><label>E-mail</label><input type="email" id="reg-email" placeholder="seu@email.com" required/></div>
      <div class="field"><label>Especialidade</label><input type="text" id="reg-esp" placeholder="Odontologia, Fisioterapia..."/></div>
      <div class="field"><label>Senha</label><input type="password" id="reg-senha" placeholder="Mínimo 6 caracteres" required/></div>
      <button class="btn" type="submit" id="btn-reg">Criar conta grátis</button>
    </form>
  </div>
</div>

<script>
const API='https://clinicos-backend-production-68fe.up.railway.app';
if(localStorage.getItem('token'))window.location.href='/dashboard.html';
function switchTab(t){
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',(i===0)===(t==='login')));
  document.getElementById('form-login').classList.toggle('hidden',t!=='login');
  document.getElementById('form-reg').classList.toggle('hidden',t!=='registro');
  document.getElementById('msg-g').innerHTML='';
}
function showMsg(t,type='error'){document.getElementById('msg-g').innerHTML=t?`<div class="msg ${type}">${t}</div>`:'';}
async function fazerLogin(e){
  e.preventDefault();const btn=document.getElementById('btn-login');btn.disabled=true;btn.textContent='Entrando...';
  try{const res=await fetch(API+'/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:document.getElementById('login-email').value,senha:document.getElementById('login-senha').value})});const data=await res.json();if(!res.ok)throw new Error(data.erro);localStorage.setItem('token',data.token);localStorage.setItem('clinica',JSON.stringify(data.clinica));window.location.href='/dashboard.html';}
  catch(err){showMsg(err.message||'Erro ao conectar');btn.disabled=false;btn.textContent='Entrar na clínica';}
}
async function fazerReg(e){
  e.preventDefault();const btn=document.getElementById('btn-reg');btn.disabled=true;btn.textContent='Criando...';
  try{const res=await fetch(API+'/api/registro',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({nome:document.getElementById('reg-nome').value,email:document.getElementById('reg-email').value,especialidade:document.getElementById('reg-esp').value,senha:document.getElementById('reg-senha').value})});const data=await res.json();if(!res.ok)throw new Error(data.erro);localStorage.setItem('token',data.token);localStorage.setItem('clinica',JSON.stringify(data.clinica));window.location.href='/dashboard.html';}
  catch(err){showMsg(err.message||'Erro ao criar conta');btn.disabled=false;btn.textContent='Criar conta grátis';}
}
</script>
</body>
</html>
