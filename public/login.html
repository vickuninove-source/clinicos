<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClinicOS — Entrar</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0d12;
      --surface: #111520;
      --border: #1e2535;
      --accent: #4fd1c5;
      --accent2: #38bdf8;
      --text: #e2e8f0;
      --muted: #64748b;
      --error: #f87171;
      --success: #4ade80;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .bg-grid {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(79,209,197,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(79,209,197,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .glow {
      position: fixed;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(79,209,197,0.07) 0%, transparent 70%);
      top: -200px; left: -200px;
      pointer-events: none;
      animation: drift 8s ease-in-out infinite alternate;
    }
    .glow2 {
      position: fixed;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(56,189,248,0.06) 0%, transparent 70%);
      bottom: -100px; right: -100px;
      pointer-events: none;
      animation: drift 10s ease-in-out infinite alternate-reverse;
    }

    @keyframes drift {
      from { transform: translate(0,0); }
      to { transform: translate(60px, 40px); }
    }

    .card {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 44px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.5);
      animation: fadeUp 0.5s ease forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }

    .logo-svg { height: 44px; width: auto; }

    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      margin-bottom: 32px;
      gap: 4px;
    }

    .tab {
      flex: 1;
      background: none;
      border: none;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      padding: 10px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: all 0.2s;
    }

    .tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .form { display: flex; flex-direction: column; gap: 16px; }
    .form.hidden { display: none; }

    .field { display: flex; flex-direction: column; gap: 6px; }

    label {
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    input {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: var(--accent); }
    input::placeholder { color: var(--muted); }

    .btn {
      margin-top: 8px;
      padding: 14px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 10px;
      color: #0a0d12;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      letter-spacing: 0.3px;
    }

    .btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .msg {
      font-size: 13px;
      padding: 10px 14px;
      border-radius: 8px;
      display: none;
    }
    .msg.error { background: rgba(248,113,113,0.1); color: var(--error); border: 1px solid rgba(248,113,113,0.2); display: block; }
    .msg.success { background: rgba(74,222,128,0.1); color: var(--success); border: 1px solid rgba(74,222,128,0.2); display: block; }
  
    @keyframes logoFade {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="glow"></div>
  <div class="glow2"></div>

  <div class="card">
        <div class="logo" style="display:flex;align-items:center;gap:12px;margin-bottom:32px;animation:logoFade 1s ease forwards;opacity:0;">
      <div style="width:44px;height:44px;background:#4fd1c5;border-radius:12px;display:flex;align-items:center;justify-content:center;">
        <svg viewBox="0 0 44 44" width="44" height="44" xmlns="http://www.w3.org/2000/svg">
          <path d="M 30 10 A 14 14 0 1 0 30 34" fill="none" stroke="#0a0d12" stroke-width="4.5" stroke-linecap="round"/>
          <line x1="30" y1="10" x2="38" y2="10" stroke="#0a0d12" stroke-width="4.5" stroke-linecap="round"/>
          <line x1="30" y1="34" x2="38" y2="34" stroke="#0a0d12" stroke-width="4.5" stroke-linecap="round"/>
        </svg>
      </div>
      <div style="font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:600;letter-spacing:0.5px;">
        Clinic<span style="color:#4fd1c5;">OS</span>
      </div>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Entrar</button>
      <button class="tab" onclick="switchTab('registro')">Criar conta</button>
    </div>

    <div id="msg" class="msg"></div>

    <!-- Login -->
    <form class="form" id="form-login" onsubmit="fazerLogin(event)">
      <div class="field">
        <label>E-mail</label>
        <input type="email" id="login-email" placeholder="clinica@exemplo.com" required />
      </div>
      <div class="field">
        <label>Senha</label>
        <input type="password" id="login-senha" placeholder="••••••••" required />
      </div>
      <button class="btn" type="submit" id="btn-login">Entrar no sistema</button>
    </form>

    <!-- Registro -->
    <form class="form hidden" id="form-registro" onsubmit="fazerRegistro(event)">
      <div class="field">
        <label>Nome da clínica</label>
        <input type="text" id="reg-nome" placeholder="Clínica Exemplo" required />
      </div>
      <div class="field">
        <label>E-mail</label>
        <input type="email" id="reg-email" placeholder="clinica@exemplo.com" required />
      </div>
      <div class="field">
        <label>Especialidade</label>
        <input type="text" id="reg-especialidade" placeholder="Odontologia, Fisioterapia..." />
      </div>
      <div class="field">
        <label>Senha</label>
        <input type="password" id="reg-senha" placeholder="Mínimo 6 caracteres" required />
      </div>
      <button class="btn" type="submit" id="btn-registro">Criar conta grátis</button>
    </form>
  </div>

  <script>
    const API = 'https://clinicos-backend-production-68fe.up.railway.app';

    // Redireciona se já logado
    if (localStorage.getItem('token')) window.location.href = '/dashboard.html';

    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', (i === 0) === (tab === 'login')));
      document.getElementById('form-login').classList.toggle('hidden', tab !== 'login');
      document.getElementById('form-registro').classList.toggle('hidden', tab !== 'registro');
      showMsg('');
    }

    function showMsg(text, type = 'error') {
      const el = document.getElementById('msg');
      el.textContent = text;
      el.className = 'msg' + (text ? ` ${type}` : '');
    }

    async function fazerLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('btn-login');
      btn.disabled = true; btn.textContent = 'Entrando...';
      try {
        const res = await fetch(`${API}/api/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('login-email').value,
            senha: document.getElementById('login-senha').value
          })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.erro);
        localStorage.setItem('token', data.token);
        localStorage.setItem('clinica', JSON.stringify(data.clinica));
        window.location.href = '/dashboard.html';
      } catch (err) {
        showMsg(err.message || 'Erro ao conectar');
        btn.disabled = false; btn.textContent = 'Entrar no sistema';
      }
    }

    async function fazerRegistro(e) {
      e.preventDefault();
      const btn = document.getElementById('btn-registro');
      btn.disabled = true; btn.textContent = 'Criando conta...';
      try {
        const res = await fetch(`${API}/api/registro`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            nome: document.getElementById('reg-nome').value,
            email: document.getElementById('reg-email').value,
            especialidade: document.getElementById('reg-especialidade').value,
            senha: document.getElementById('reg-senha').value
          })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.erro);
        localStorage.setItem('token', data.token);
        localStorage.setItem('clinica', JSON.stringify(data.clinica));
        window.location.href = '/dashboard.html';
      } catch (err) {
        showMsg(err.message || 'Erro ao criar conta');
        btn.disabled = false; btn.textContent = 'Criar conta grátis';
      }
    }
  </script>
</body>
</html>
