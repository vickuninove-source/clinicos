<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ClinicOS</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--accent:#007aff;--text:#000;--text2:#3c3c43;--text3:#8e8e93;--border:rgba(0,0,0,.1);--error:#ff3b30;--success:#34c759}
body{background:#f2f2f7;color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;-webkit-font-smoothing:antialiased}
.bg{position:fixed;inset:0;background:linear-gradient(160deg,#e8f4ff 0%,#f2f2f7 50%,#f0faf4 100%);pointer-events:none}
.card{position:relative;background:rgba(255,255,255,.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.8);border-radius:24px;padding:44px 40px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.1);animation:up .6s cubic-bezier(.34,1.56,.64,1) forwards;opacity:0;transform:translateY(24px) scale(.97)}
@keyframes up{to{opacity:1;transform:translateY(0) scale(1)}}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:36px}
.logo-icon{width:44px;height:44px;background:var(--accent);border-radius:12px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(0,122,255,.3)}
.logo-text{font-size:24px;font-weight:700;letter-spacing:-.3px}
.logo-text span{color:var(--accent)}
.tabs{display:flex;background:#f2f2f7;border-radius:10px;padding:3px;margin-bottom:28px}
.tab{flex:1;background:none;border:none;font-family:inherit;font-size:14px;font-weight:500;padding:8px;border-radius:8px;cursor:pointer;color:var(--text3);transition:all .2s}
.tab.active{background:#fff;color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.1)}
.form{display:flex;flex-direction:column;gap:12px}
.form.hidden{display:none}
.field{display:flex;flex-direction:column;gap:6px}
label{font-size:13px;font-weight:500;color:var(--text2)}
input{background:#f2f2f7;border:1px solid transparent;border-radius:12px;padding:13px 16px;color:var(--text);font-family:inherit;font-size:16px;outline:none;transition:all .2s;-webkit-appearance:none}
input:focus{background:#fff;border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,122,255,.15)}
input::placeholder{color:var(--text3)}
.btn{margin-top:8px;padding:14px;background:var(--accent);border:none;border-radius:12px;color:#fff;font-family:inherit;font-size:16px;font-weight:600;cursor:pointer;transition:all .15s;letter-spacing:-.1px}
.btn:hover{opacity:.85}
.btn:active{transform:scale(.98)}
.btn:disabled{opacity:.4}
.msg{font-size:13px;padding:10px 14px;border-radius:10px;margin-top:4px}
.msg.error{background:rgba(255,59,48,.08);color:var(--error);border:1px solid rgba(255,59,48,.15)}
.msg.success{background:rgba(52,199,89,.08);color:var(--success)}
</style>
</head>
<body>
<div class="bg"></div>
<div class="card">
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 28 28" width="28" height="28"><path d="M19 5A11 11 0 1 0 19 23" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round"/><line x1="19" y1="5" x2="25" y2="5" stroke="#fff" stroke-width="3" stroke-linecap="round"/><line x1="19" y1="23" x2="25" y2="23" stroke="#fff" stroke-width="3" stroke-linecap="round"/></svg>
    </div>
    <div class="logo-text">Clinic<span>OS</span></div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('login')">Entrar</button>
    <button class="tab" onclick="switchTab('registro')">Criar conta</button>
  </div>

  <div id="msg-global"></div>

  <form class="form" id="form-login" onsubmit="fazerLogin(event)">
    <div class="field"><label>E-mail</label><input type="email" id="login-email" placeholder="seu@email.com" required/></div>
    <div class="field"><label>Senha</label><input type="password" id="login-senha" placeholder="••••••••" required/></div>
    <button class="btn" type="submit" id="btn-login">Entrar</button>
  </form>

  <form class="form hidden" id="form-registro" onsubmit="fazerRegistro(event)">
    <div class="field"><label>Nome da clínica</label><input type="text" id="reg-nome" placeholder="Clínica Exemplo" required/></div>
    <div class="field"><label>E-mail</label><input type="email" id="reg-email" placeholder="seu@email.com" required/></div>
    <div class="field"><label>Especialidade</label><input type="text" id="reg-esp" placeholder="Odontologia, Fisioterapia..."/></div>
    <div class="field"><label>Senha</label><input type="password" id="reg-senha" placeholder="Mínimo 6 caracteres" required/></div>
    <button class="btn" type="submit" id="btn-reg">Criar conta grátis</button>
  </form>
</div>

<script>
const API='https://clinicos-backend-production-68fe.up.railway.app';
if(localStorage.getItem('token'))window.location.href='/dashboard.html';

function switchTab(t){
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',(i===0)===(t==='login')));
  document.getElementById('form-login').classList.toggle('hidden',t!=='login');
  document.getElementById('form-registro').classList.toggle('hidden',t!=='registro');
  document.getElementById('msg-global').innerHTML='';
}

function showMsg(text,type='error'){
  const el=document.getElementById('msg-global');
  el.innerHTML=text?`<div class="msg ${type}">${text}</div>`:'';
}

async function fazerLogin(e){
  e.preventDefault();
  const btn=document.getElementById('btn-login');
  btn.disabled=true;btn.textContent='Entrando...';
  try{
    const res=await fetch(API+'/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:document.getElementById('login-email').value,senha:document.getElementById('login-senha').value})});
    const data=await res.json();
    if(!res.ok)throw new Error(data.erro);
    localStorage.setItem('token',data.token);
    localStorage.setItem('clinica',JSON.stringify(data.clinica));
    window.location.href='/dashboard.html';
  }catch(err){showMsg(err.message||'Erro ao conectar');btn.disabled=false;btn.textContent='Entrar';}
}

async function fazerRegistro(e){
  e.preventDefault();
  const btn=document.getElementById('btn-reg');
  btn.disabled=true;btn.textContent='Criando...';
  try{
    const res=await fetch(API+'/api/registro',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({nome:document.getElementById('reg-nome').value,email:document.getElementById('reg-email').value,especialidade:document.getElementById('reg-esp').value,senha:document.getElementById('reg-senha').value})});
    const data=await res.json();
    if(!res.ok)throw new Error(data.erro);
    localStorage.setItem('token',data.token);
    localStorage.setItem('clinica',JSON.stringify(data.clinica));
    window.location.href='/dashboard.html';
  }catch(err){showMsg(err.message||'Erro ao criar conta');btn.disabled=false;btn.textContent='Criar conta grátis';}
}
</script>
</body>
</html>
