<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ClinicOS — Estoque</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#faf8f5;
  --surface:#ffffff;
  --surface2:#f5f1ec;
  --surface3:#ede8e0;
  --border:rgba(139,90,60,.1);
  --border2:rgba(139,90,60,.18);
  --accent:#c1714f;
  --accent2:#e8916e;
  --accent-light:rgba(193,113,79,.1);
  --gold:#b8956a;
  --gold-light:rgba(184,149,106,.12);
  --text:#1a1208;
  --text2:#4a3728;
  --text3:#9c8070;
  --success:#5a8a5a;
  --error:#c0392b;
  --warning:#c47c2b;
  --shadow:0 2px 16px rgba(139,90,60,.08);
  --shadow2:0 8px 40px rgba(139,90,60,.14);
  --radius:16px;--radius2:22px;--radius3:10px;
}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;display:flex;-webkit-font-smoothing:antialiased}

/* SIDEBAR */
.sidebar{width:264px;min-height:100vh;background:var(--text);display:flex;flex-direction:column;padding:28px 14px;position:fixed;top:0;left:0;bottom:0;overflow-y:auto}
.logo{display:flex;align-items:center;gap:12px;padding:8px 12px;margin-bottom:36px}
.logo-icon{width:38px;height:38px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-text{font-family:'Playfair Display',serif;font-size:21px;font-weight:600;color:#fff;letter-spacing:.2px}
.logo-text span{color:var(--accent2)}
nav{flex:1;display:flex;flex-direction:column;gap:2px}
.nav-sec{font-size:10px;font-weight:600;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:1.2px;padding:18px 12px 6px}
.nav-link{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius3);color:rgba(255,255,255,.55);text-decoration:none;font-size:14px;font-weight:400;transition:all .15s}
.nav-link:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.9)}
.nav-link.active{background:var(--accent);color:#fff;font-weight:500}
.nav-icon{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;background:rgba(255,255,255,.08)}
.nav-link.active .nav-icon{background:rgba(255,255,255,.2)}
.sidebar-footer{border-top:1px solid rgba(255,255,255,.08);padding-top:14px;margin-top:14px}
.clinica-info{padding:10px 12px;display:flex;align-items:center;gap:10px}
.avatar{width:34px;height:34px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:#fff;flex-shrink:0}
.clinica-nome{font-size:13px;font-weight:500;color:#fff}
.clinica-esp{font-size:11px;color:rgba(255,255,255,.4)}
.btn-logout{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:var(--radius3);color:rgba(255,255,255,.4);background:none;border:none;font-family:inherit;font-size:14px;cursor:pointer;transition:all .15s;width:100%}
.btn-logout:hover{background:rgba(192,57,43,.15);color:#e88;}

/* MAIN */
.main{margin-left:264px;flex:1;padding:36px 36px;min-height:100vh}
.page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:32px}
.page-title{font-family:'Playfair Display',serif;font-size:36px;font-weight:600;letter-spacing:-.3px;color:var(--text)}
.page-subtitle{font-size:14px;color:var(--text3);margin-top:3px;font-weight:400}

/* BTN */
.btn{display:inline-flex;align-items:center;gap:6px;padding:11px 20px;background:var(--accent);border:none;border-radius:var(--radius3);color:#fff;font-family:inherit;font-size:14px;font-weight:500;cursor:pointer;transition:all .15s;text-decoration:none;letter-spacing:.1px}
.btn:hover{background:var(--accent2);transform:translateY(-1px);box-shadow:0 4px 16px rgba(193,113,79,.3)}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-outline{background:transparent;border:1px solid var(--border2);color:var(--text2)}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light);transform:none;box-shadow:none}
.btn-danger{background:rgba(192,57,43,.1);border:1px solid rgba(192,57,43,.2);color:var(--error)}
.btn-danger:hover{background:rgba(192,57,43,.18);transform:none;box-shadow:none}

/* TABLE */
.table-wrap{background:var(--surface);border-radius:var(--radius2);box-shadow:var(--shadow);overflow:hidden;border:1px solid var(--border)}
table{width:100%;border-collapse:collapse}
thead{background:var(--surface2)}
th{padding:12px 20px;text-align:left;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.6px}
td{padding:15px 20px;font-size:14px;border-top:1px solid var(--border);color:var(--text)}
tr:hover td{background:var(--surface2)}
.empty{text-align:center;padding:60px;color:var(--text3);font-size:14px}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(26,18,8,.5);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .25s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--surface);border-radius:var(--radius2);padding:32px;width:100%;max-width:480px;transform:translateY(20px) scale(.97);transition:all .25s;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow2);border:1px solid var(--border)}
.modal-overlay.open .modal{transform:translateY(0) scale(1)}
.modal-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:600;margin-bottom:22px;color:var(--text)}
.form{display:flex;flex-direction:column;gap:14px}
.field{display:flex;flex-direction:column;gap:6px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
label{font-size:12px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}
input,select,textarea{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius3);padding:11px 14px;color:var(--text);font-family:inherit;font-size:14px;outline:none;transition:all .15s;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-light);background:var(--surface)}
input::placeholder,textarea::placeholder{color:var(--text3)}
select option{background:var(--surface)}
textarea{resize:vertical;min-height:80px}
.modal-footer{display:flex;gap:10px;margin-top:22px;justify-content:flex-end}
.msg{font-size:13px;padding:10px 14px;border-radius:var(--radius3);margin-top:4px}
.msg.error{background:rgba(192,57,43,.07);color:var(--error);border:1px solid rgba(192,57,43,.15)}
.msg.success{background:rgba(90,138,90,.07);color:var(--success);border:1px solid rgba(90,138,90,.15)}

/* BADGE */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;letter-spacing:.2px}
.badge-agendada{background:rgba(184,149,106,.15);color:#7a5c2e}
.badge-realizada,.badge-aprovado,.badge-ativo{background:rgba(90,138,90,.12);color:#2d6b3a}
.badge-cancelada,.badge-recusado,.badge-critico{background:rgba(192,57,43,.1);color:var(--error)}
.badge-pendente{background:rgba(196,124,43,.12);color:#8a5a10}

/* STATS */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:18px;margin-bottom:32px}
.stat-card{background:var(--surface);border-radius:var(--radius2);padding:24px;box-shadow:var(--shadow);border:1px solid var(--border);position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--gold))}
.stat-label{font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px}
.stat-value{font-family:'Playfair Display',serif;font-size:38px;font-weight:600;line-height:1;color:var(--text)}
.stat-sub{font-size:12px;color:var(--text3);margin-top:5px}

/* SEARCH */
.search-bar{display:flex;gap:10px;margin-bottom:22px}
.search-input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius3);padding:11px 16px;color:var(--text);font-family:inherit;font-size:14px;outline:none;transition:all .15s;box-shadow:var(--shadow)}
.search-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-light)}
.search-input::placeholder{color:var(--text3)}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body><aside class="sidebar">
  <div class="logo">
    <div class="logo-icon"><svg viewBox="0 0 22 22" width="22" height="22"><path d="M15 4A9 9 0 1 0 15 18" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/><line x1="15" y1="4" x2="20" y2="4" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/><line x1="15" y1="18" x2="20" y2="18" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/></svg></div>
    <div class="logo-text">Clinic<span>OS</span></div>
  </div>
  <nav>
    <div class="nav-sec">Menu</div>
        <a class="nav-link" href="/dashboard.html"><span class="nav-icon">◈</span>Início</a>
    <a class="nav-link" href="/pacientes.html"><span class="nav-icon">◉</span>Pacientes</a>
    <a class="nav-link" href="/consultas.html"><span class="nav-icon">◷</span>Consultas</a>
    <a class="nav-link" href="/procedimentos.html"><span class="nav-icon">✦</span>Procedimentos</a>
    <a class="nav-link" href="/orcamentos.html"><span class="nav-icon">◎</span>Orçamentos</a>
    <a class="nav-link" href="/financeiro.html"><span class="nav-icon">◐</span>Financeiro</a>
    <a class="nav-link active" href="/estoque.html"><span class="nav-icon">▣</span>Estoque</a>
    <a class="nav-link" href="/retornos.html"><span class="nav-icon">↺</span>Retornos</a>
    <a class="nav-link" href="/usuarios.html"><span class="nav-icon">👤</span>Usuários</a>

  </nav>
  <div class="sidebar-footer">
    <div class="clinica-info">
      <div class="avatar" id="avatar">C</div>
      <div>
        <div class="clinica-nome" id="clinica-nome">Clínica</div>
        <div class="clinica-esp" id="clinica-esp"></div>
      </div>
    </div>
    <button class="btn-logout" onclick="logout()">⎋ Sair</button>
  </div>
</aside>
<main class="main">
  <div class="page-header">
    <div><div class="page-title">Estoque</div><div class="page-subtitle">Controle de materiais e produtos</div></div>
    <button class="btn" onclick="abrir()">+ Novo item</button>
  </div>
  <div class="search-bar"><input class="search-input" placeholder="Buscar item..." id="busca" oninput="filtrar()"/></div>
  <div class="table-wrap">
    <table><thead><tr><th>Item</th><th>Quantidade</th><th>Mínimo</th><th>Unidade</th><th>Custo</th><th>Status</th><th></th></tr></thead>
    <tbody id="tbody"></tbody></table>
  </div>
</main>
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title" id="mt">Novo Item</div>
    <div class="form">
      <div class="field"><label>Nome</label><input id="e-nome" placeholder="Nome do produto"/></div>
      <div class="field"><label>Descrição</label><input id="e-desc" placeholder="Opcional"/></div>
      <div class="field-row">
        <div class="field"><label>Quantidade</label><input id="e-qtd" type="number" placeholder="0"/></div>
        <div class="field"><label>Qtd mínima</label><input id="e-min" type="number" placeholder="5"/></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Unidade</label><input id="e-un" placeholder="un, caixa, ml"/></div>
        <div class="field"><label>Preço custo</label><input id="e-preco" type="number" step="0.01" placeholder="0,00"/></div>
      </div>
      <div id="msg"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="fechar()">Cancelar</button>
      <button class="btn" id="btn-s" onclick="salvar()">Salvar</button>
    </div>
  </div>
</div>
<script>
const API='https://clinicos-backend-production-68fe.up.railway.app';
const token=localStorage.getItem('token');
if(!token)window.location.href='/login.html';
const clinica=JSON.parse(localStorage.getItem('clinica')||'{}');
if(document.getElementById('clinica-nome'))document.getElementById('clinica-nome').textContent=clinica.nome||'Clínica';
if(document.getElementById('clinica-esp'))document.getElementById('clinica-esp').textContent=clinica.especialidade||'';
if(document.getElementById('avatar'))document.getElementById('avatar').textContent=(clinica.nome||'C')[0].toUpperCase();
function logout(){localStorage.clear();window.location.href='/login.html';}
async function api(path,opts={}){
  const res=await fetch(API+path,{headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'},...opts});
  if(res.status===401){logout();return null;}
  return res.json();
}
function fmtMoeda(v){return 'R$ '+parseFloat(v||0).toFixed(2).replace('.',',').replace(/\B(?=(\d{3})+(?!\d))/g,'.');}
function fmtData(d){if(!d)return '—';return new Date(d).toLocaleDateString('pt-BR');}
function fmtDH(d){if(!d)return '—';const dt=new Date(d);return dt.toLocaleDateString('pt-BR')+' '+dt.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});}

let todos=[],editId=null;
async function carregar(){const data=await api('/api/estoque');if(data){todos=data;renderizar(data);}}
function filtrar(){const q=document.getElementById('busca').value.toLowerCase();renderizar(todos.filter(x=>x.nome.toLowerCase().includes(q)));}
function renderizar(lista){const tb=document.getElementById('tbody');if(!lista.length){tb.innerHTML='<tr><td colspan="7" class="empty">Estoque vazio</td></tr>';return;}tb.innerHTML=lista.map(e=>{const c=e.quantidade<=e.quantidade_minima;return `<tr><td><div style="font-weight:500">${e.nome}</div><div style="font-size:12px;color:var(--text3)">${e.descricao||''}</div></td><td style="font-size:20px;font-weight:700;color:${c?'var(--error)':'var(--success)'}">${e.quantidade}</td><td style="color:var(--text3)">${e.quantidade_minima}</td><td>${e.unidade||'—'}</td><td>${fmtMoeda(e.preco_custo)}</td><td><span class="badge badge-${c?'critico':'ativo'}">${c?'Crítico':'OK'}</span></td><td><button class="btn btn-outline" style="padding:6px 12px;font-size:13px" onclick="editar(${e.id})">Editar</button></td></tr>`;}).join('');}
function abrir(){editId=null;document.getElementById('mt').textContent='Novo Item';['e-nome','e-desc','e-qtd','e-min','e-un','e-preco'].forEach(id=>document.getElementById(id).value='');document.getElementById('modal').classList.add('open');}
function fechar(){document.getElementById('modal').classList.remove('open');}
function editar(id){const e=todos.find(x=>x.id===id);if(!e)return;editId=id;document.getElementById('mt').textContent='Editar Item';document.getElementById('e-nome').value=e.nome;document.getElementById('e-desc').value=e.descricao||'';document.getElementById('e-qtd').value=e.quantidade;document.getElementById('e-min').value=e.quantidade_minima;document.getElementById('e-un').value=e.unidade||'';document.getElementById('e-preco').value=e.preco_custo;document.getElementById('modal').classList.add('open');}
async function salvar(){const btn=document.getElementById('btn-s');const nome=document.getElementById('e-nome').value.trim();if(!nome){document.getElementById('msg').innerHTML='<div class="msg error">Informe o nome</div>';return;}btn.disabled=true;btn.textContent='Salvando...';const body={nome,descricao:document.getElementById('e-desc').value,quantidade:parseInt(document.getElementById('e-qtd').value)||0,quantidade_minima:parseInt(document.getElementById('e-min').value)||5,unidade:document.getElementById('e-un').value,preco_custo:parseFloat(document.getElementById('e-preco').value)||0};const res=editId?await api('/api/estoque/'+editId,{method:'PUT',body:JSON.stringify(body)}):await api('/api/estoque',{method:'POST',body:JSON.stringify(body)});btn.disabled=false;btn.textContent='Salvar';if(res){fechar();carregar();}}
document.getElementById('modal').addEventListener('click',e=>{if(e.target===e.currentTarget)fechar();});
carregar();
</script></body></html>
